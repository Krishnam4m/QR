<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamLink – Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
            --border: #2a2a3d; --accent: #6c63ff; --accent2: #ff6584;
            --green: #00e5a0; --text: #e8e8f0; --muted: #6b6b8a;
            --font-display: 'Syne', sans-serif; --font-mono: 'IBM Plex Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font-display);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(0,229,160,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .card {
            position: relative; z-index: 1; background: var(--surface);
            border: 1px solid var(--border); border-radius: 24px; padding: 2rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 0 60px rgba(108,99,255,0.08), 0 20px 60px rgba(0,0,0,0.6);
        }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
            color: var(--accent); font-size: 0.7rem; font-family: var(--font-mono);
            letter-spacing: 0.12em; text-transform: uppercase;
            padding: 4px 12px; border-radius: 100px; margin-bottom: 1.2rem;
        }
        .badge::before {
            content: ''; width: 6px; height: 6px; background: var(--accent);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        h1 {
            font-size: 1.7rem; font-weight: 800; line-height: 1.2; margin-bottom: 0.4rem;
            background: linear-gradient(135deg, var(--text) 30%, var(--muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.8rem; }
        .btn-primary {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #8b7fff);
            border: none; border-radius: 14px; color: white;
            font-family: var(--font-display); font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(108,99,255,0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.4); }
        .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
        .code-panel { display: none; animation: fadeUp 0.4s ease; }
        .code-panel.show { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); }
        }
        .qr-box { display: flex; justify-content: center; margin-bottom: 1.2rem; }
        .qr-inner { background: white; padding: 16px; border-radius: 16px; display: inline-block; }
        .session-label {
            font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted);
            letter-spacing: 0.1em; text-transform: uppercase; text-align: center; margin-bottom: 0.5rem;
        }
        .session-code {
            font-family: var(--font-mono); font-size: 2.8rem; font-weight: 600;
            color: var(--accent); text-align: center; letter-spacing: 0.25em; margin-bottom: 1.5rem;
        }
        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 0.7rem; }
        .btn-share {
            padding: 0.8rem 0.5rem; border: 1px solid var(--border); border-radius: 12px;
            background: var(--surface2); color: var(--text); font-family: var(--font-display);
            font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-share:hover { border-color: var(--accent); background: rgba(108,99,255,0.12); transform: translateY(-1px); }
        .btn-share svg { width: 18px; height: 18px; flex-shrink: 0; }
        .btn-share.wa:hover { border-color: #25d366; background: rgba(37,211,102,0.1); }
        .btn-share.sm:hover { border-color: #5ac8fa; background: rgba(90,200,250,0.1); }
        .btn-share.cp:hover { border-color: var(--green); background: rgba(0,229,160,0.1); }
        .btn-share.sh:hover { border-color: var(--accent2); background: rgba(255,101,132,0.1); }
        .btn-full {
            width: 100%; padding: 0.85rem; border: 1px solid var(--border); border-radius: 12px;
            background: var(--surface2); color: var(--text); font-family: var(--font-display);
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 0.7rem;
        }
        .btn-full:hover { border-color: var(--accent); background: rgba(108,99,255,0.12); }
        .status-bar {
            display: flex; align-items: center; gap: 10px; padding: 0.75rem 1rem;
            border-radius: 12px; background: var(--surface2); border: 1px solid var(--border);
            font-size: 0.8rem; color: var(--muted); margin-top: 1rem;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
        .dot.waiting { background: #f59e0b; animation: pulse 1.5s infinite; }
        .dot.live { background: var(--green); animation: pulse 1s infinite; }
        .dot.error { background: var(--accent2); }
        #livePanel { display: none; margin-top: 1rem; }
        #livePanel.show { display: block; animation: fadeUp 0.4s ease; }
        .live-badge {
            display: flex; align-items: center; gap: 6px; color: var(--green);
            font-size: 0.75rem; font-family: var(--font-mono);
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem;
        }
        .live-badge::before {
            content: ''; width: 8px; height: 8px; background: var(--green);
            border-radius: 50%; animation: pulse 1s infinite;
        }
        video#remoteVideo {
            width: 100%; border-radius: 16px; background: #000; aspect-ratio: 4/3;
            object-fit: cover; border: 1px solid var(--green);
            box-shadow: 0 0 30px rgba(0,229,160,0.15);
        }
        .btn-danger {
            margin-top: 0.8rem; width: 100%; padding: 0.7rem;
            background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3);
            border-radius: 10px; color: var(--accent2); font-family: var(--font-display);
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
        }
        .toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 0.6rem 1.4rem; border-radius: 100px; font-size: 0.8rem;
            font-family: var(--font-mono); opacity: 0; transition: all 0.3s;
            pointer-events: none; z-index: 999; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">CamLink Generator</div>
    <h1>Remote Camera<br>Access Portal</h1>
    <p class="subtitle">Code banao, share karo — doosre ka camera apne screen pe dekho.</p>

    <button class="btn-primary" id="generateBtn">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Naya Session Banao
    </button>

    <div class="divider"></div>

    <div class="code-panel" id="codePanel">
        <div class="qr-box"><div class="qr-inner"><div id="qrcode"></div></div></div>
        <div class="session-label">Session Code</div>
        <div class="session-code" id="sessionCode">——</div>

        <div class="share-grid">
            <button class="btn-share wa" id="btnWA">
                <svg viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.549 4.107 1.51 5.833L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-4.988-1.362l-.358-.212-3.762.98.999-3.671-.233-.376A9.818 9.818 0 1112 21.818z"/></svg>
                WhatsApp
            </button>
            <button class="btn-share sm" id="btnSMS">
                <svg viewBox="0 0 24 24" fill="none" stroke="#5ac8fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                SMS / Text
            </button>
            <button class="btn-share cp" id="btnCopy">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy Code
            </button>
            <button class="btn-share sh" id="btnShare">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff6584" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share Karo
            </button>
        </div>

        <button class="btn-full" id="btnShareLink">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            Scanner Link + Code Share Karo
        </button>

        <div class="status-bar">
            <div class="dot waiting" id="dot"></div>
            <span id="statusTxt">Server se connect ho raha hai...</span>
        </div>

        <div id="livePanel">
            <div class="live-badge">Live Camera Feed</div>
            <video id="remoteVideo" autoplay playsinline muted></video>
            <button class="btn-danger" onclick="location.reload()">🔴 Session Band Karo</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ================================================================
//  PeerJS — cross-device signaling via peerjs.com cloud server
//  Works on different devices, different networks
// ================================================================

let sessionCode = '';
let peer = null;
let mediaConn = null;

// Multiple STUN + free TURN for NAT traversal (cross-network)
const PC_CONFIG = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:global.stun.twilio.com:3478' },
        {
            urls: [
                'turn:openrelay.metered.ca:80',
                'turn:openrelay.metered.ca:443',
                'turn:openrelay.metered.ca:443?transport=tcp'
            ],
            username: 'openrelayproject',
            credential: 'openrelayproject'
        }
    ]
};

function setStatus(type, msg) {
    document.getElementById('dot').className = 'dot ' + type;
    document.getElementById('statusTxt').textContent = msg;
}

function showToast(msg, ms = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
}

function genCode() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
}

// Load PeerJS with fallback CDNs
function loadPeerJS() {
    return new Promise((resolve, reject) => {
        if (typeof Peer !== 'undefined') { resolve(); return; }
        const urls = [
            'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js',
            'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js'
        ];
        let idx = 0;
        function tryNext() {
            if (idx >= urls.length) { reject(new Error('PeerJS load failed')); return; }
            const s = document.createElement('script');
            s.src = urls[idx++];
            s.onload = resolve;
            s.onerror = tryNext;
            document.head.appendChild(s);
        }
        tryNext();
    });
}

document.getElementById('generateBtn').addEventListener('click', async () => {
    if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }

    sessionCode = genCode();
    document.getElementById('codePanel').classList.add('show');
    document.getElementById('sessionCode').textContent = sessionCode;
    document.getElementById('livePanel').classList.remove('show');
    document.getElementById('generateBtn').textContent = '🔄 Naya Code Banao';

    // QR Code
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
        text: sessionCode, width: 160, height: 160,
        colorDark: '#1c1c28', colorLight: '#ffffff'
    });

    setStatus('waiting', 'PeerJS server se connect ho raha hai...');

    try {
        await loadPeerJS();
    } catch(e) {
        setStatus('error', '❌ Library load nahi hui. Internet check karo.');
        return;
    }

    startPeer();
});

function startPeer(attempt) {
    attempt = attempt || 0;
    // Use code as peer ID — generator prefix
    const peerId = 'clgen-' + sessionCode;

    peer = new Peer(peerId, { config: PC_CONFIG, debug: 0 });

    peer.on('open', () => {
        setStatus('waiting', 'Ready ✅ — Scanner pe code enter karo aur camera share karo!');
        showToast('✅ Server connected! Ab code share karo.', 3000);
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            // ID clash — regenerate code
            sessionCode = genCode();
            document.getElementById('sessionCode').textContent = sessionCode;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), {
                text: sessionCode, width: 160, height: 160,
                colorDark: '#1c1c28', colorLight: '#ffffff'
            });
            peer.destroy();
            setTimeout(() => startPeer(attempt + 1), 600);
        } else if (err.type === 'network' || err.type === 'server-error') {
            if (attempt < 3) {
                setStatus('waiting', 'Reconnect ho raha hai... (' + (attempt+1) + '/3)');
                peer.destroy();
                setTimeout(() => startPeer(attempt + 1), 2000);
            } else {
                setStatus('error', '❌ Server se connect nahi ho paya. Internet check karo.');
            }
        } else {
            setStatus('error', '⚠️ Error: ' + err.type);
            console.error('Peer error:', err);
        }
    });

    // Scanner will CALL us with their camera stream
    peer.on('call', (call) => {
        mediaConn = call;
        call.answer(); // Answer with no stream (we just want to receive)
        setStatus('waiting', '📡 Camera stream aa raha hai...');

        call.on('stream', (remoteStream) => {
            const vid = document.getElementById('remoteVideo');
            vid.srcObject = remoteStream;
            vid.onloadedmetadata = () => vid.play().catch(() => {});
            document.getElementById('livePanel').classList.add('show');
            setStatus('live', '🟢 Live Camera Feed Chal Rahi Hai!');
            showToast('🎥 Camera Connected! Live dekho!', 4000);
        });

        call.on('close', () => {
            setStatus('waiting', 'Camera disconnect ho gayi. Naya code banao ya scanner reconnect karo.');
            document.getElementById('livePanel').classList.remove('show');
        });

        call.on('error', (err) => {
            setStatus('error', 'Stream error. Dobara try karo.');
            console.error('Call error:', err);
        });
    });

    peer.on('disconnected', () => {
        setStatus('waiting', 'Disconnected — Reconnect ho raha hai...');
        try { peer.reconnect(); } catch(e) {}
    });
}

// ================================================================
//  Share Buttons
// ================================================================
function scannerURL() {
    return window.location.href.replace(/[^\/]*$/, 'scanner.html');
}
function shareText() {
    return '🎥 CamLink Remote Camera\nScanner kholo: ' + scannerURL() + '\nCode: *' + sessionCode + '*\n(Code enter karo aur camera share karo)';
}

document.getElementById('btnWA').onclick = () => {
    if (!sessionCode) { showToast('Pehle code banao!'); return; }
    window.open('https://wa.me/?text=' + encodeURIComponent(shareText()), '_blank');
};

document.getElementById('btnSMS').onclick = () => {
    if (!sessionCode) { showToast('Pehle code banao!'); return; }
    window.open('sms:?body=' + encodeURIComponent(shareText()), '_self');
};

document.getElementById('btnCopy').onclick = async () => {
    if (!sessionCode) { showToast('Pehle code banao!'); return; }
    try { await navigator.clipboard.writeText(sessionCode); showToast('✅ Code Copy: ' + sessionCode); }
    catch { showToast('Code hai: ' + sessionCode); }
};

document.getElementById('btnShare').onclick = async () => {
    if (!sessionCode) { showToast('Pehle code banao!'); return; }
    try { await navigator.share({ title: 'CamLink', text: shareText(), url: scannerURL() }); }
    catch {
        try { await navigator.clipboard.writeText(shareText()); showToast('✅ Copy Ho Gaya!'); }
        catch { showToast('Code: ' + sessionCode); }
    }
};

document.getElementById('btnShareLink').onclick = async () => {
    if (!sessionCode) { showToast('Pehle code banao!'); return; }
    try { await navigator.share({ title: 'CamLink', text: shareText(), url: scannerURL() }); }
    catch {
        try { await navigator.clipboard.writeText(shareText()); showToast('✅ Link+Code Copy Ho Gaya!'); }
        catch { showToast('Code: ' + sessionCode); }
    }
};
</script>
</body>
</html>
